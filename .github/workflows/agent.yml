# Cloud scheduler for the Blob agent — free on public repos, no card needed.
#
# Why GitHub Actions works for this competition: the daily mandatory trade
# fires on ANY successful cycle of the day (run_once retries it every hour
# until done), so the 5-15 min cron jitter of hosted runners is harmless.
# Agent state (portfolio peak, last trade date, audit log) persists on the
# orphan branch `agent-state`.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   CMC_API_KEY, TWAK_ACCESS_ID, TWAK_HMAC_SECRET,
#   TWAK_WALLET_PASSWORD, TWAK_HOME_B64 (= tar.gz of ~/.twak, base64)
# Repository variables: AGENT_MODE (paper|live), X402_ENABLED (0|1)

name: agent

on:
  schedule:
    # Requested every 30 min, but GitHub delays/batches scheduled runs under
    # load — observed effective cadence on this repo is ~2h at hourly request.
    # Over-requesting pulls the effective interval down toward ~1h, which the
    # intraday drawdown ladder needs. Runs are idempotent (date-based rebalance,
    # concurrency group below), so extra triggers are harmless.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      rebalance:
        description: "Force a full strategy rebalance (debug/ops)"
        type: boolean
        default: false
      live:
        description: "Force MODE=live for this one run (pre-window validation)"
        type: boolean
        default: false

concurrency:
  group: agent
  cancel-in-progress: false

# GitHub forces Node 24 for JS actions on June 16, 2026 — mid-competition.
# Opt in now so the switch is validated before the live week, not during it.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 260   # internal loop: 8 cycles × 30 min ≈ 3.5h
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent and TWAK CLI
        run: |
          pip install -q -e .
          npm install -g --silent @trustwallet/cli
          twak --version

      - name: Configure (secrets never echoed)
        env:
          AGENT_MODE: ${{ vars.AGENT_MODE || 'paper' }}
          FORCE_LIVE: ${{ inputs.live }}
        run: |
          # Auto-live during the competition window (no manual flip needed):
          # MODE=live for 2026-06-22 00:00 UTC .. 2026-06-29 00:00 UTC, or when a
          # run is dispatched with live=true (pre-window validation). Paper otherwise.
          now=$(date -u +%s)
          start=$(date -u -d '2026-06-22 00:00:00' +%s)
          end=$(date -u -d '2026-06-29 00:00:00' +%s)
          if [ "$FORCE_LIVE" = "true" ] || { [ "$now" -ge "$start" ] && [ "$now" -lt "$end" ]; }; then
            MODE=live
          else
            MODE="$AGENT_MODE"
          fi
          echo "resolved MODE=$MODE"
          install -m 600 /dev/null .env
          {
            echo "CMC_API_KEY=${{ secrets.CMC_API_KEY }}"
            echo "TWAK_ACCESS_ID=${{ secrets.TWAK_ACCESS_ID }}"
            echo "TWAK_HMAC_SECRET=${{ secrets.TWAK_HMAC_SECRET }}"
            echo "AGENT_WALLET_ADDRESS=0x84BFC511d8027337B285433f122880fB340f30B9"
            echo "MODE=$MODE"
            echo "X402_ENABLED=${{ vars.X402_ENABLED || '0' }}"
            echo "ATTEST_ENABLED=${{ vars.ATTEST_ENABLED || '0' }}"
          } > .env
          mkdir -p ~/.twak
          echo "${{ secrets.TWAK_HOME_B64 }}" | base64 -d | tar -xz -C ~/.twak

      - name: Restore state from agent-state branch
        run: |
          mkdir -p state logs
          if git ls-remote --exit-code --heads origin agent-state >/dev/null 2>&1; then
            git fetch -q --depth=1 origin agent-state
            git --work-tree=state checkout -q FETCH_HEAD -- .
            git reset -q  # keep the index clean for the main working tree
            [ -f state/agent.jsonl ] && mv state/agent.jsonl logs/agent.jsonl
          fi

      # Internal cycle loop: GitHub throttles scheduled workflows to ~2h
      # regardless of the cron frequency (measured on this repo). Running
      # several cycles per job, 30 min apart, decouples our effective cadence
      # from GitHub's trigger throttling — the intraday drawdown ladder needs
      # it. State is pushed after each cycle so a mid-loop failure loses nothing.
      - name: Run agent cycles
        env:
          # Defensive trim: `security ... -w | gh secret set` keeps a trailing
          # newline, which makes wallet decryption fail (WALLET_AUTH_FAILED).
          TWAK_WALLET_PASSWORD_RAW: ${{ secrets.TWAK_WALLET_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          export TWAK_WALLET_PASSWORD="$(printf '%s' "$TWAK_WALLET_PASSWORD_RAW" | tr -d '\r\n')"
          rebalance_flag="${{ inputs.rebalance == true && '--rebalance' || '' }}"
          interval_min=30
          max_cycles=8
          for i in $(seq 1 "$max_cycles"); do
            echo "::group::cycle $i/$max_cycles"
            python -m blob run-once $rebalance_flag || echo "cycle $i failed, continuing"
            [ -f logs/agent.jsonl ] && cp logs/agent.jsonl state/agent.jsonl
            ( cd state
              git init -q -b agent-state
              git config user.name "blob-agent"
              git config user.email "blob-agent@users.noreply.github.com"
              git add -A
              git commit -qm "state $(date -u +%FT%TZ)" || true
              git push -q -f "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" agent-state || true
            )
            echo "::endgroup::"
            rebalance_flag=""   # a forced rebalance applies to the first cycle only
            # `if` (not `&& sleep`): a false test as the loop's last command
            # would return non-zero and fail the whole job under `bash -e`,
            # even though every cycle ran and state was pushed (false alarm).
            if [ "$i" -lt "$max_cycles" ]; then sleep $((interval_min * 60)); fi
          done
